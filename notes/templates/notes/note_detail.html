{% extends 'base.html' %}

{% block title %}
  Sticky Notes - {{ note.title }}
{% endblock %}

{% block content %}
  <article class="note-card">
    <h2>{{ note.title }}</h2>
    <p>{{ note.content }}</p>

    {% if note.author %}
      <p>Author: {{ note.author.name }}</p>
    {% endif %}

    <p>Created: {{ note.created_at }}</p>
  </article>

  <p>
    <a href="{% url 'note_update' pk=note.pk %}">Update note</a>
    <a href="{% url 'note_delete' pk=note.pk %}">Delete note</a>
  </p>
{% endblock %}
