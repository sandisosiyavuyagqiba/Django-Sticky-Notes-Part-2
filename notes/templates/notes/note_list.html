{% extends 'base.html' %}

{% block title %}
  Sticky Notes - {{ page_title }}
{% endblock %}

{% block content %}
  <h2>{{ page_title }}</h2>

  <ul class="note-list">
    {% for note in notes %}
      <li class="note-card">
        <a href="{% url 'note_detail' pk=note.pk %}">
          {{ note.title }}
        </a>
        <p>{{ note.content }}</p>
      </li>
    {% empty %}
      <li>No notes have been added yet.</li>
    {% endfor %}
  </ul>
{% endblock %}
